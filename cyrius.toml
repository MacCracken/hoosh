[package]
name = "hoosh"
version = "2.0.0"
description = "AI inference gateway — multi-provider LLM routing, token budgets, caching"
license = "GPL-3.0-only"
language = "cyrius"
cyrius = "3.10.0"

[build]
entry = "src/main.cyr"
output = "hoosh"

[deps]
stdlib = ["string", "fmt", "alloc", "vec", "str", "io", "fs", "args", "hashmap", "freelist", "bigint", "sigil", "toml", "json", "tagged", "http", "net", "chrono", "syscalls", "assert", "bench"]
