name: Release

on:
  push:
    tags: ['[0-9]+.[0-9]+.[0-9]+']

permissions:
  contents: write

jobs:
  ci:
    name: CI Gate
    uses: ./.github/workflows/ci.yml

  release:
    name: Build & Release
    needs: [ci]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify version
        run: |
          FILE_VERSION=$(cat VERSION | tr -d '[:space:]')
          TAG="${GITHUB_REF_NAME}"
          echo "$TAG" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$' || { echo "tag ($TAG) is not semver x.y.z"; exit 1; }
          [ "$FILE_VERSION" = "$TAG" ] || { echo "VERSION ($FILE_VERSION) != tag ($TAG)"; exit 1; }
          grep -q '^version = "\${file:VERSION}"' cyrius.cyml || { echo "cyrius.cyml version must be \${file:VERSION}"; exit 1; }
          grep -q "\[$TAG\]" CHANGELOG.md || { echo "version $TAG not in CHANGELOG.md"; exit 1; }

      - name: Install Cyrius toolchain
        run: |
          CYRIUS_VERSION="${CYRIUS_VERSION:-$(grep -E '^cyrius[[:space:]]*=' cyrius.cyml | sed -E 's/^cyrius[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/')}"
          echo "Installing Cyrius $CYRIUS_VERSION"
          curl -sSf "https://raw.githubusercontent.com/MacCracken/cyrius/main/scripts/install.sh" \
            | CYRIUS_VERSION="$CYRIUS_VERSION" sh
          echo "$HOME/.cyrius/bin" >> $GITHUB_PATH
          echo "CYRIUS_HOME=$HOME/.cyrius" >> $GITHUB_ENV

      - name: Build (DCE)
        run: |
          cyrius lib sync
          cyrius deps
          mkdir -p build
          # -D CYRIUS_TLS_NATIVE: native TLS stack — no fdlopen libssl/glibc,
          # which SIGSEGVs on repeated remote requests. Flag MUST precede the
          # source; main.cyr warns at startup if native is not active.
          CYRIUS_DCE=1 cyrius build -D CYRIUS_TLS_NATIVE src/main.cyr build/hoosh
          xxd -l 4 build/hoosh | grep -q "7f45 4c46"
          echo "hoosh: $(wc -c < build/hoosh) bytes"

      - name: Smoke test
        run: |
          ./build/hoosh version
          ./build/hoosh help > /dev/null

      - name: Package
        run: |
          TAG="${GITHUB_REF_NAME}"
          cp build/hoosh "hoosh-${TAG}-x86_64-linux"
          sha256sum "hoosh-${TAG}-x86_64-linux" > SHA256SUMS

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            hoosh-*-x86_64-linux
            SHA256SUMS
