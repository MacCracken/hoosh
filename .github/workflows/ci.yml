name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build, Test & Bench
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Cyrius toolchain
        run: |
          # Canonical installer — lays out ~/.cyrius/versions/$VER/{bin,lib}/
          # plus the ~/.cyrius/{bin,lib} → versions/$VER symlinks that
          # `cyrius lib sync` and `cyrius deps` expect. The pin is the
          # single source of truth in cyrius.cyml (no .cyrius-toolchain).
          CYRIUS_VERSION="${CYRIUS_VERSION:-$(grep -E '^cyrius[[:space:]]*=' cyrius.cyml | sed -E 's/^cyrius[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/')}"
          echo "Installing Cyrius $CYRIUS_VERSION"
          curl -sSf "https://raw.githubusercontent.com/MacCracken/cyrius/main/scripts/install.sh" \
            | CYRIUS_VERSION="$CYRIUS_VERSION" sh
          echo "$HOME/.cyrius/bin" >> $GITHUB_PATH
          echo "CYRIUS_HOME=$HOME/.cyrius" >> $GITHUB_ENV

      - name: Verify toolchain
        run: cyrius --version

      - name: Sync stdlib into ./lib/
        # `./lib/` is gitignored — `cyrius lib sync` (6.0.0+) copies the
        # pinned stdlib snapshot from ~/.cyrius/versions/$VER/lib/ into
        # ./lib/. Must run before any compile step.
        run: cyrius lib sync

      - name: Resolve non-stdlib deps
        # Resolves [deps.ai-hwaccel] → vendors dist/ai-hwaccel.cyr into
        # lib/ai-hwaccel.cyr (consumed via `include "lib/ai-hwaccel.cyr"`).
        run: cyrius deps

      - name: Verify dep hashes
        run: |
          if [ -f cyrius.lock ]; then
            cyrius deps --verify
          else
            echo "no cyrius.lock — nothing to verify"
          fi

      - name: Include-graph audit
        run: cyrius vet src/main.cyr

      - name: Format check
        # cyrius fmt <file> emits formatted source to stdout; diff
        # against the committed file to enforce no drift.
        run: |
          fail=0
          for f in src/main.cyr src/lib/*.cyr tests/*.tcyr tests/*.bcyr; do
            [ -f "$f" ] || continue
            if ! diff -q <(cyrius fmt "$f" 2>/dev/null) "$f" > /dev/null; then
              echo "needs fmt: $f"
              fail=1
            fi
          done
          [ $fail -eq 0 ] || { echo "fmt: drift detected"; exit 1; }

      - name: Lint
        # Hard gate: any `warn` line fails the build.
        run: |
          fail=0
          for f in src/main.cyr src/lib/*.cyr; do
            [ -f "$f" ] || continue
            out=$(cyrius lint "$f" 2>&1 || true)
            echo "$out" | grep -qE '^[[:space:]]*warn ' && { echo "lint: warnings in $f"; echo "$out"; fail=1; }
          done
          [ $fail -eq 0 ] || { echo "lint: warnings present"; exit 1; }

      - name: Build (DCE)
        run: |
          mkdir -p build
          CYRIUS_DCE=1 cyrius build src/main.cyr build/hoosh
          echo "hoosh: $(wc -c < build/hoosh) bytes"

      - name: Verify ELF
        run: xxd -l 4 build/hoosh | grep -q "7f45 4c46"

      - name: Test suite
        run: cyrius test tests/hoosh.tcyr

      - name: Benchmarks (mandatory release gate)
        # Benchmarks are required for every release (see CLAUDE.md). The
        # gate fails if the suite does not build/run or records no data.
        # Set CYRIUS_SKIP_BENCH=1 only with explicit maintainer waiver.
        env:
          CYRIUS_SKIP_BENCH: ${{ vars.CYRIUS_SKIP_BENCH }}
        run: |
          if [ "${CYRIUS_SKIP_BENCH:-0}" = "1" ]; then
            echo "::warning::benchmarks skipped by maintainer waiver (CYRIUS_SKIP_BENCH=1)"
            exit 0
          fi
          ./scripts/bench-history.sh bench-history.csv benchmarks.md
          rows=$(( $(wc -l < bench-history.csv) - 1 ))
          test "$rows" -gt 0 || { echo "FAIL: no benchmarks recorded — benchmarks are a required release gate"; exit 1; }
          echo "benchmarks recorded ($rows CSV rows total)"

      - name: Upload bench history
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-history-${{ github.sha }}
          path: bench-history.csv
          if-no-files-found: ignore
          retention-days: 90

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check required docs
        run: |
          MISSING=0
          for doc in README.md CHANGELOG.md CLAUDE.md CONTRIBUTING.md SECURITY.md CODE_OF_CONDUCT.md LICENSE VERSION cyrius.cyml; do
            if [ -f "$doc" ]; then echo "  OK: $doc"; else echo "  MISSING: $doc"; MISSING=1; fi
          done
          exit $MISSING

      - name: Verify version consistency
        run: |
          # cyrius.cyml uses ${file:VERSION}, so VERSION is the single
          # source of truth. Assert the interpolation literal is present
          # and the VERSION value appears in CHANGELOG.
          FILE_VERSION=$(cat VERSION | tr -d '[:space:]')
          grep -q '^version = "\${file:VERSION}"' cyrius.cyml || {
            echo "FAIL: cyrius.cyml version must be \${file:VERSION}"; exit 1; }
          grep -q "\[$FILE_VERSION\]" CHANGELOG.md || {
            echo "FAIL: version $FILE_VERSION not in CHANGELOG.md"; exit 1; }
          echo "Version consistent: $FILE_VERSION"
