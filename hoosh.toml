# hoosh configuration
# See BENCHMARKS.md for performance data.

[server]
bind = "127.0.0.1"
port = 8088
strategy = "priority"

[cache]
max_entries = 1000
ttl_secs = 300
enabled = true

# --- Local providers ---

[[providers]]
type = "Ollama"
# base_url = "http://localhost:11434"  # default
priority = 1
models = ["llama*", "mistral*", "qwen*", "phi*", "gemma*"]

